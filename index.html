function randInt(n) { return Math.floor(Math.random() * n); }
function manhattan(a, b) { return Math.abs(a.x - b.x) + Math.abs(a.y - b.y); }
function same(a, b) { return a && b && a.x === b.x && a.y === b.y; }
function inBounds(x, y) { return x >= 0 && x < GRID && y >= 0 && y < GRID; }

// For pacman-wrap: returns wrapped {x,y} if movement from (fx,fy) in dir lands out of bounds
// on an enabled wrap axis through the middle edges. Otherwise returns null.
function wrapCoords(fx, fy, dir) {
  const s = state;
  if (!s) return null;
  const center = Math.floor(GRID / 2); // 5
  // Middle edge cells — from middle cell out. Player standing at (center, 0) moves 'n' -> wrap to (center, GRID-1)
  if (s.wrapVertical && (fx === center - 1 || fx === center)) {
    if (dir === 'n' && fy === 0) return { x: fx, y: GRID - 1 };
    if (dir === 's' && fy === GRID - 1) return { x: fx, y: 0 };
  }
  if (s.wrapHorizontal && (fy === center - 1 || fy === center)) {
    if (dir === 'w' && fx === 0) return { x: GRID - 1, y: fy };
    if (dir === 'e' && fx === GRID - 1) return { x: 0, y: fy };
  }
  return null;
}

function hasLineOfSight(from, to, walls, blockers) {
  if (from.x === to.x && from.y === to.y) return false;
  const blockSet = blockers ? new Set(blockers.map(b => b.x * 100 + b.y)) : null;
  const blocked = (x, y) => blockSet && (x !== from.x || y !== from.y) && (x !== to.x || y !== to.y) && blockSet.has(x * 100 + y);
  if (from.x === to.x) {
    const step = from.y < to.y ? 1 : -1;
    for (let y = from.y; y !== to.y; y += step) {
      if (step > 0 && walls[y][from.x].s) return false;
      if (step < 0 && walls[y][from.x].n) return false;
      const ny = y + step;
      if (blocked(from.x, ny)) return false;
    }
    return true;
  }
  if (from.y === to.y) {
    const step = from.x < to.x ? 1 : -1;
    for (let x = from.x; x !== to.x; x += step) {
      if (step > 0 && walls[from.y][x].e) return false;
      if (step < 0 && walls[from.y][x].w) return false;
      const nx = x + step;
      if (blocked(nx, from.y)) return false;
    }
    return true;
  }
  return false;
}

function rayFirstEnemy(from, dir, walls, enemies) {
  const def = DIRS[dir];
  let x = from.x, y = from.y;
  for (let step = 0; step < GRID; step++) {
    if (walls[y][x][dir]) return null;
    x += def.dx; y += def.dy;
    if (!inBounds(x, y)) return null;
    const target = enemies.find(e => e.x === x && e.y === y);
    if (target) return target;
  }
  return null;
}

// =================== MAZE ===================
function createFullWalls() {
  const w = [];
  for (let y = 0; y < GRID; y++) {
    w[y] = [];
    for (let x = 0; x < GRID; x++) w[y][x] = { n: true, e: true, s: true, w: true };
  }
  return w;
}

function generateMaze() {
  const walls = createFullWalls();
  const visited = Array.from({length: GRID}, () => new Array(GRID).fill(false));
  const stack = [[randInt(GRID), randInt(GRID)]];
  visited[stack[0][1]][stack[0][0]] = true;
  while (stack.length) {
    const [x, y] = stack[stack.length - 1];
    const avail = [];
    for (const [d, def] of Object.entries(DIRS)) {
      const nx = x + def.dx, ny = y + def.dy;
      if (inBounds(nx, ny) && !visited[ny][nx]) avail.push([d, nx, ny]);
    }
    if (!avail.length) stack.pop();
    else {
      const [d, nx, ny] = avail[randInt(avail.length)];
      walls[y][x][d] = false;
      walls[ny][nx][DIRS[d].opp] = false;
      visited[ny][nx] = true;
      stack.push([nx, ny]);
    }
  }
  const loops = Math.floor(GRID * GRID * 0.12);
  for (let i = 0; i < loops; i++) {
    const x = randInt(GRID), y = randInt(GRID);
    const d = DIR_KEYS[randInt(4)];
    const nx = x + DIRS[d].dx, ny = y + DIRS[d].dy;
    if (inBounds(nx, ny)) {
      walls[y][x][d] = false;
      walls[ny][nx][DIRS[d].opp] = false;
    }
  }
  return walls;
}

function accessibleNeighbors(x, y, walls) {
  const r = [];
  for (const [d, def] of Object.entries(DIRS)) {
    if (!walls[y][x][d]) r.push({ x: x + def.dx, y: y + def.dy });
  }
  return r;
}

// BFS with ability to avoid pits and visible mines, optional ignoreWalls
function bfsNext(from, to, walls, opts = {}) {
  const { ignoreWalls = false, avoidPits = false, avoidMines = false, blockedCells = [], useTeleport = false } = opts;
  if (from.x === to.x && from.y === to.y) return null;
  const key = (x, y) => x * 100 + y;
  const startKey = key(from.x, from.y);
  const visited = new Set([startKey]);
  const parent = new Map();
  const queue = [[from.x, from.y]];
  const s = state;

  const blockedSet = new Set(blockedCells.map(c => key(c.x, c.y)));

  const teleportPair = (x, y) => {
    if (!useTeleport) return null;
    if (s.teleports.length === 2) {
      const [a, b] = s.teleports;
      if (a.x === x && a.y === y) return b;
      if (b.x === x && b.y === y) return a;
    }
    if (s.teleports2.length === 2) {
      const [a, b] = s.teleports2;
      if (a.x === x && a.y === y) return b;
      if (b.x === x && b.y === y) return a;
    }
    return null;
  };

  const canEnter = (nx, ny, isDestination) => {
    if (isDestination) return true;
    if (avoidPits && s.tiles[ny][nx] === 'pit') return false;
    if (avoidMines) {
      const vis = s.mines.find(m => m.x === nx && m.y === ny && !m.stealth);
      if (vis) return false;
    }
    if (blockedSet.has(key(nx, ny))) return false;
    return true;
  };

  while (queue.length) {
    const [x, y] = queue.shift();
    if (x === to.x && y === to.y) {
      let cur = key(x, y);
      while (parent.get(cur) !== undefined && parent.get(cur) !== startKey) cur = parent.get(cur);
      return { x: Math.floor(cur / 100), y: cur % 100 };
    }
    const neighbors = ignoreWalls
      ? DIR_KEYS.map(d => ({ x: x + DIRS[d].dx, y: y + DIRS[d].dy })).filter(n => inBounds(n.x, n.y))
      : accessibleNeighbors(x, y, walls);
    // Add pacman wrap neighbors
    for (const d of DIR_KEYS) {
      const wrapped = wrapCoords(x, y, d);
      if (wrapped && !neighbors.some(n => n.x === wrapped.x && n.y === wrapped.y)) {
        neighbors.push(wrapped);
      }
    }
    for (const n of neighbors) {
      const k = key(n.x, n.y);
      if (visited.has(k)) continue;
      if (!canEnter(n.x, n.y, n.x === to.x && n.y === to.y)) continue;
      visited.add(k);
      parent.set(k, key(x, y));
      queue.push([n.x, n.y]);
    }
    // Teleport virtual step — pair has this cell as parent so first-step trace lands on this cell (physical step)
    const pair = teleportPair(x, y);
    if (pair) {
      const pk = key(pair.x, pair.y);
      if (!visited.has(pk)) {
        visited.add(pk);
        parent.set(pk, key(x, y));
        queue.push([pair.x, pair.y]);
      }
    }
  }
  return null;
}

// =================== INVENTORY HELPERS ===================
function emptySlotIndex() {
  const inv = state.player.inv;
  for (let i = 0; i < inv.length; i++) if (!inv[i]) return i;
  return -1;
}
function selectedItem() { return state.player.inv[state.player.selectedSlot]; }
function selectedIs(type) { return selectedItem() === type; }
function findItemSlot(type) { return state.player.inv.findIndex(s => s === type); }
function consumeSelected() { state.player.inv[state.player.selectedSlot] = null; }
function consumeHeart() {
  if (state.player.hasHeart) { state.player.hasHeart = false; return true; }
  return false;
}
function consumeFirstOfType(type) {
  const idx = findItemSlot(type);
  if (idx !== -1) state.player.inv[idx] = null;
  return idx !== -1;
}
function amuletCount() { return state.player.inv.filter(s => s === 'amulet').length; }
function regenThreshold() { return 3 + amuletCount(); }

// =================== SETUP ===================
function cellOccupied(c) {
  const s = state;
  if (same(c, s.player)) return true;
  if (same(c, s.exit)) return true;
  for (const e of s.enemies) if (same(c, e)) return true;
  for (const it of s.items) if (same(c, it)) return true;
  for (const m of s.mines) if (same(c, m)) return true;
  for (const t of s.teleports) if (same(c, t)) return true;
  for (const t of s.teleports2) if (same(c, t)) return true;
  if (s.tiles[c.y][c.x] !== 'normal') return true;
  return false;
}

function randomEmptyCell(pred) {
  const list = [];
  for (let y = 0; y < GRID; y++) for (let x = 0; x < GRID; x++) {
    const cell = { x, y };
    if (cellOccupied(cell)) continue;
    if (pred && !pred(cell)) continue;
    list.push(cell);
  }
  if (!list.length) {
    for (let y = 0; y < GRID; y++) for (let x = 0; x < GRID; x++) {
      const cell = { x, y };
      if (!cellOccupied(cell)) list.push(cell);
    }
  }
  return list.length ? list[randInt(list.length)] : null;
}

function getExitCandidates(start) {
  const list = [
    {x:0,y:0},{x:9,y:0},{x:0,y:9},{x:9,y:9},
    {x:0,y:4},{x:0,y:5},{x:9,y:4},{x:9,y:5},
    {x:4,y:0},{x:5,y:0},{x:4,y:9},{x:5,y:9}
  ];
  return list.filter(c => manhattan(c, start) >= 6);
}

function far3(c) {
  const s = state;
  if (manhattan(c, s.player) < 3) return false;
  for (const e of s.enemies) if (manhattan(c, e) < 3) return false;
  return true;
}

function newGame() {
  eventLog.length = 0;
  renderEventLog();
  const nb = document.getElementById('newsBlock');
  if (nb) nb.innerHTML = '';
  state = {
    walls: null,
    tiles: Array.from({length: GRID}, () => new Array(GRID).fill('normal')),
    conveyorDirs: Array.from({length: GRID}, () => new Array(GRID).fill(null)),
    player: { x: 0, y: 0, inv: new Array(INITIAL_INV_SIZE).fill(null), invSize: INITIAL_INV_SIZE, selectedSlot: 0, onMineId: null, skipNextTurn: false, lastMoveDir: null, hasHeart: false },
    keysNeeded: 0,
    enemies: [], items: [], mines: [], mineIdCounter: 0,
    teleports: [], teleports2: [], exit: { x: 0, y: 0 },
    round: 1, moves: 0, killed: 0,
    movesSinceRegen: 0, freezeMaze: 0,
    gameOver: false, transitioning: false,
    fogOfWar: false,
    wrapHorizontal: false,  // pacman-style: left <-> right
    wrapVertical: false,    // pacman-style: top <-> bottom
    startCorner: { x: 0, y: 0 },
    seenItems: new Set(), seenEnemies: new Set(['regular']), seenTiles: new Set()
  };
  pendingAction = null;
  pendingPickup = null;
  document.getElementById('restartBtn').style.display = 'none';
  setupRound(1);
}

function roundSpec(r) {
  const spec = {
    regular: 1, patrol: 0, sniper: 0, ghost: 0, boss: 0,
    pits: 0, knives: 0, superknives: 0,
    tilde: 0, clock: 0, mine: 0, stealthmine: 0, random: 0,
    shield: 0, crossbow: 0, amulet: 0, restart: 0,
    teleport: false, slot: false, keys: 0,
    ice: 0, mud: 0, conveyor: 0, fog: false
  };
  if (r % 3 === 0) spec.slot = true;

  if (r <= 3) spec.regular = 1;
  else if (r <= 5) spec.regular = 2;
  else if (r <= 8) spec.regular = 3;
  else spec.regular = 4;

  if (r >= 2) spec.pits = 1;
  if (r >= 8) spec.pits = 2;

  if (r >= 3 && r !== 10 && r !== 20) spec.knives = 1;
  if (r >= 9 && r !== 10 && r !== 20) spec.knives = 2;

  if (r >= 4) spec.teleport = true;
  if (r >= 6) { spec.patrol = 1; spec.regular = Math.max(0, spec.regular - 1); spec.tilde = 1; }
  if (r >= 7) { spec.shield = 1; spec.clock = 1; }
  if (r >= 8) spec.ice = 3;
  if (r >= 9) spec.mine = 1;
  if (r === 9 || r >= 11) spec.random = 1;
  if (r >= 11) { spec.mud = 3; spec.clock = 2; }
  if (r >= 12) { spec.sniper = 1; spec.regular = Math.max(0, spec.regular - 1); spec.stealthmine = 1; }
  if (r >= 13) spec.crossbow = 1;
  if (r >= 14) { spec.ghost = 1; spec.regular = Math.max(0, spec.regular - 1); }
  if (r >= 15) spec.keys = 1;
  if (r >= 18) spec.keys = 2;
  if (r >= 20) spec.keys = 2;
  if (r >= 16) spec.fog = true;
  if (r >= 17) spec.conveyor = 3;
  if (r >= 7 && Math.random() < 0.4) spec.amulet = 1;
  if (r >= 9 && Math.random() < 0.3) spec.restart = 1;

  if (r === 10 || r === 20) {
    spec.boss = 1;
    spec.regular = r === 10 ? 2 : 3;
    spec.ghost = r === 20 ? 1 : 0;
    spec.patrol = 0; spec.sniper = 0;
    spec.superknives = 2;
    spec.knives = 0;
    spec.lock = false; spec.keys = 0; // boss itself locks exit
    spec.fog = r === 20;
  }
  return spec;
}

function setupRound(round) {
  const s = state;

  const prevItems = new Set(s.seenItems);
  const prevEnemies = new Set(s.seenEnemies);
  const prevTiles = new Set(s.seenTiles);

  s.round = round;
  s.movesSinceRegen = 0;
  s.freezeMaze = 0;
  s.items = []; s.mines = []; s.teleports = []; s.teleports2 = []; s.enemies = [];
  s.player.skipNextTurn = false;
  s.tiles = Array.from({length: GRID}, () => new Array(GRID).fill('normal'));
  s.conveyorDirs = Array.from({length: GRID}, () => new Array(GRID).fill(null));

  let start;
  if (round === 1 || !s.previousExitInfo) {
    const corners = [{x:0,y:0},{x:9,y:0},{x:0,y:9},{x:9,y:9}];
    start = corners[randInt(4)];
  } else {
    start = edgeStartFromExit(s.previousExitInfo.exit, s.previousExitInfo.dir);
  }
  s.startCorner = {...start};
  s.player.x = start.x; s.player.y = start.y;
  s.player.onMineId = null;
  s.player.lastMoveDir = null;
  s.player.hasHeart = false;

  const exits = getExitCandidates(start);
  s.exit = {...exits[randInt(exits.length)]};
  s.walls = generateMaze();

  const spec = roundSpec(round);
  s.fogOfWar = spec.fog;
  // Pac-man wraps — from round 3 onward
  s.wrapHorizontal = round >= 3 && Math.random() < 0.30;
  s.wrapVertical = round >= 3 && Math.random() < 0.30;
  if (s.wrapHorizontal || s.wrapVertical) { s.seenTiles.add('__wrap__'); }

  s.keysNeeded = spec.keys;
  if (spec.keys > 0) { s.tiles[s.exit.y][s.exit.x] = 'lock'; s.seenTiles.add('lock'); }

  const placeTileZone = (type, count) => {
    for (let i = 0; i < count; i++) {
      const pos = randomEmptyCell(c => manhattan(c, s.player) >= 3 && manhattan(c, s.exit) >= 2);
      if (pos) {
        s.tiles[pos.y][pos.x] = type;
        if (type === 'conveyor') s.conveyorDirs[pos.y][pos.x] = DIR_KEYS[randInt(4)];
        s.seenTiles.add(type);
      }
    }
  };
  placeTileZone('ice', spec.ice);
  placeTileZone('mud', spec.mud);
  placeTileZone('conveyor', spec.conveyor);

  for (let i = 0; i < spec.pits; i++) {
    const pos = randomEmptyCell(c => manhattan(c, s.player) >= 7);
    if (pos) { s.tiles[pos.y][pos.x] = 'pit'; s.seenTiles.add('pit'); }
  }

  for (let i = 0; i < spec.boss; i++) {
    const pos = randomEmptyCell(c => manhattan(c, s.player) >= 6);
    if (pos) { s.enemies.push({ type: 'boss', x: pos.x, y: pos.y, inv: null, frozen: 0, onMineId: null, hp: 2, skipNextTurn: false }); s.seenEnemies.add('boss'); }
  }
  for (let i = 0; i < spec.regular; i++) {
    const pos = randomEmptyCell(c => manhattan(c, s.player) >= 5);
    if (pos) s.enemies.push({ type: 'regular', x: pos.x, y: pos.y, inv: null, frozen: 0, onMineId: null, skipNextTurn: false });
  }
  for (let i = 0; i < spec.patrol; i++) {
    const pos = randomEmptyCell(c => manhattan(c, s.player) >= 5);
    if (pos) { s.enemies.push({ type: 'patrol', x: pos.x, y: pos.y, inv: null, frozen: 0, onMineId: null, dir: DIR_KEYS[randInt(4)], skipNextTurn: false }); s.seenEnemies.add('patrol'); }
  }
  for (let i = 0; i < spec.sniper; i++) {
    const pos = randomEmptyCell(c => manhattan(c, s.player) >= 5);
    if (pos) { s.enemies.push({ type: 'sniper', x: pos.x, y: pos.y, inv: null, frozen: 0, onMineId: null, skipNextTurn: false }); s.seenEnemies.add('sniper'); }
  }
  for (let i = 0; i < spec.ghost; i++) {
    const pos = randomEmptyCell(c => manhattan(c, s.player) >= 5);
    if (pos) { s.enemies.push({ type: 'ghost', x: pos.x, y: pos.y, inv: null, frozen: 0, onMineId: null, skipNext: false, skipNextTurn: false }); s.seenEnemies.add('ghost'); }
  }

  const addItem = (type, dist) => {
    const pos = randomEmptyCell(c => manhattan(c, s.player) >= (dist || 3));
    if (pos) { s.items.push({ type, x: pos.x, y: pos.y }); s.seenItems.add(type); }
  };

  for (let i = 0; i < spec.knives; i++) addItem('knife', 5);
  for (let i = 0; i < spec.superknives; i++) addItem('superknife', 4);
  if (spec.teleport) {
    const a = randomEmptyCell(c => manhattan(c, s.player) >= 5 && manhattan(c, s.exit) >= 5);
    if (a) {
      s.teleports.push(a);
      const b = randomEmptyCell(c => manhattan(c, s.player) >= 5 && manhattan(c, s.exit) >= 5 && manhattan(c, a) >= 3);
      if (b) s.teleports.push(b); else s.teleports.pop();
    }
  }
  // Second (orange) teleport pair from round 20
  if (round >= 20) {
    const a = randomEmptyCell(c => manhattan(c, s.player) >= 4 && manhattan(c, s.exit) >= 4);
    if (a) {
      s.teleports2.push(a);
      const b = randomEmptyCell(c => manhattan(c, s.player) >= 4 && manhattan(c, s.exit) >= 4 && manhattan(c, a) >= 3);
      if (b) s.teleports2.push(b); else s.teleports2.pop();
    }
  }
  for (let i = 0; i < spec.tilde; i++) addItem('tilde');
  for (let i = 0; i < spec.clock; i++) addItem('clock');
  for (let i = 0; i < spec.mine; i++) addItem('mine');
  for (let i = 0; i < spec.stealthmine; i++) addItem('stealthmine');
  for (let i = 0; i < spec.random; i++) addItem('random');
  for (let i = 0; i < spec.shield; i++) addItem('shield', 4);
  for (let i = 0; i < spec.crossbow; i++) addItem('crossbow', 4);
  for (let i = 0; i < spec.amulet; i++) addItem('amulet');
  for (let i = 0; i < spec.restart; i++) addItem('restart');
  if (spec.slot) addItem('slot');
  for (let i = 0; i < spec.keys; i++) {
    // Key must be on a fully empty cell (no items, no tiles, no enemies)
    const pos = randomEmptyCell(c => manhattan(c, s.player) >= 4 && manhattan(c, s.exit) >= 4);
    if (pos) { s.items.push({ type: 'key', x: pos.x, y: pos.y }); s.seenItems.add('key'); }
  }
  // Heart spawn: always on boss rounds, 20% chance otherwise
  const hasBossThisRound = spec.boss > 0;
  const heartRoll = hasBossThisRound || Math.random() < 0.20;
  if (heartRoll && round >= 3) {
    const pos = randomEmptyCell(c => manhattan(c, s.player) >= 3);
    if (pos) { s.items.push({ type: 'heart', x: pos.x, y: pos.y }); s.seenItems.add('heart'); }
  }

  // Build tips for this round
  const newItems = [...s.seenItems].filter(x => !prevItems.has(x));
  const newEnemies = [...s.seenEnemies].filter(x => !prevEnemies.has(x));
  const newTiles = [...s.seenTiles].filter(x => !prevTiles.has(x));
  if (spec.fog && !state._fogTipShown) { newTiles.push('__fog__'); state._fogTipShown = true; }

  renderNews([
    ...newEnemies.map(k => t('hint_' + k)),
    ...newItems.map(k => t('hint_' + k)),
    ...newTiles.map(k => k === '__fog__' ? t('hint_fog') : k === '__wrap__' ? t('hint_wrap') : t('hint_' + k))
  ].filter(Boolean));

  render();
  renderInventory();
  updateHUD();
  flashCanvas();
  showMessage(t('roundStart', round));
}

function renderNews(entries) {
  const el = document.getElementById('newsBlock');
  if (!el) return;
  if (!entries.length) { el.innerHTML = ''; return; }
  el.innerHTML = entries.map(txt => `<div class="news-entry">${txt}</div>`).join('');
}

function inferExitDir(exit, lastDir) {
  // Priority: use last move direction if it's consistent with an edge
  if (exit.x === 0 && lastDir === 'w') return 'w';
  if (exit.x === 9 && lastDir === 'e') return 'e';
  if (exit.y === 0 && lastDir === 'n') return 'n';
  if (exit.y === 9 && lastDir === 's') return 's';
  // Fall back to edge by position
  if (exit.x === 0) return 'w';
  if (exit.x === 9) return 'e';
  if (exit.y === 0) return 'n';
  if (exit.y === 9) return 's';
  return lastDir || 'n';
}

function edgeStartFromExit(exit, dir) {
  // Same perpendicular coordinate, opposite edge
  if (dir === 'n') return { x: exit.x, y: 9 };
  if (dir === 's') return { x: exit.x, y: 0 };
  if (dir === 'e') return { x: 0, y: exit.y };
  if (dir === 'w') return { x: 9, y: exit.y };
  return { x: 0, y: 0 };
}

function cubeTransition(exitDir, midCallback) {
  return new Promise((resolve) => {
    const canvas = document.getElementById('canvas');
    const back = document.getElementById('canvasBack');
    const stage = document.getElementById('cubeStage');
    const size = canvas.width;
    const half = size / 2;

    // 1. Snapshot current (old) state onto back canvas
    back.width = size;
    back.height = size;
    back.getContext('2d').drawImage(canvas, 0, 0);

    // 2. Render new state onto main canvas
    midCallback();

    // 3. Position faces: BACK canvas (with old snapshot) at front of cube,
    //    MAIN canvas (new state) at adjacent face based on exit direction.
    //    After stage rotation the main canvas ends up at the front.
    let mainTransform, stageTarget;
    if (exitDir === 'e') {
      // New face is on the right side of the cube
      mainTransform = `rotateY(90deg) translateZ(${half}px)`;
      stageTarget = `translateZ(-${half}px) rotateY(-90deg)`;
    } else if (exitDir === 'w') {
      mainTransform = `rotateY(-90deg) translateZ(${half}px)`;
      stageTarget = `translateZ(-${half}px) rotateY(90deg)`;
    } else if (exitDir === 'n') {
      mainTransform = `rotateX(90deg) translateZ(${half}px)`;
      stageTarget = `translateZ(-${half}px) rotateX(-90deg)`;
    } else { // s
      mainTransform = `rotateX(-90deg) translateZ(${half}px)`;
      stageTarget = `translateZ(-${half}px) rotateX(90deg)`;
    }

    // Reset stage and show back canvas as front face
    stage.style.transition = 'none';
    stage.style.transform = `translateZ(-${half}px)`;
    back.style.display = 'block';
    back.style.transform = `translateZ(${half}px)`;
    canvas.style.transform = mainTransform;
    // Force reflow so the "from" state is applied before transition starts
    void stage.offsetWidth;

    // 4. Animate stage rotation. 920ms (15% slower) with ease for a natural cube feel.
    stage.style.transition = 'transform 920ms cubic-bezier(0.5, 0.05, 0.3, 1)';
    stage.style.transform = stageTarget;

    setTimeout(() => {
      // 5. Cleanup — canvas returns to flat, back canvas hidden
      stage.style.transition = 'none';
      stage.style.transform = '';
      canvas.style.transform = '';
      back.style.display = 'none';
      back.style.transform = '';
      void stage.offsetWidth;
      stage.style.transition = '';
      resolve();
    }, 940);
  });
}
function flashCanvas() { /* deprecated — cube transition is the round change indicator */ }
function regenerateMaze() {
  state.walls = generateMaze();
  state.movesSinceRegen = 0;
}

// =================== PLAYER ACTIONS ===================
function handlePendingDirection(dir) {
  const s = state;
  const p = s.player;
  if (pendingAction === 'tilde') {
    pendingAction = null;
    const def = DIRS[dir];
    const nx = p.x + def.dx, ny = p.y + def.dy;
    if (!inBounds(nx, ny)) { showMessage(t('tildeOuterNo')); return true; }
    if (s.walls[p.y][p.x][dir]) {
      s.walls[p.y][p.x][dir] = false;
      s.walls[ny][nx][def.opp] = false;
      consumeFirstOfType('tilde');
      renderInventory();
      showMessage(t('tildeBroken'));
      performPlayerMove(nx, ny, dir);
    } else {
      showMessage(t('tildeNoWall'));
    }
    return true;
  }
  if (pendingAction === 'crossbow') {
    pendingAction = null;
    const target = rayFirstEnemy({x:p.x, y:p.y}, dir, s.walls, s.enemies);
    consumeFirstOfType('crossbow');
    if (target) {
      damageEnemy(target, 'crossbow');
    } else {
      showMessage(t('crossbowMiss'));
    }
    renderInventory();
    render(); updateHUD();
    return true;
  }
  return false;
}

function tryMovePlayer(dir) {
  const s = state;
  if (s.gameOver || s.transitioning) return;
  if (handlePendingDirection(dir)) return;

  const p = s.player;

  if (p.skipNextTurn) {
    p.skipNextTurn = false;
    showMessage(t('stuckInMud'));
    s.moves++;
    advanceMazeRegen();
    enemyTurn();
    render(); renderInventory(); updateHUD();
    return;
  }

  const def = DIRS[dir];
  let nx = p.x + def.dx, ny = p.y + def.dy;
  if (!inBounds(nx, ny)) {
    const wrapped = wrapCoords(p.x, p.y, dir);
    if (wrapped) { nx = wrapped.x; ny = wrapped.y; }
    else return;
  } else if (s.walls[p.y][p.x][dir]) {
    return;
  }
  performPlayerMove(nx, ny, dir);
}

function advanceMazeRegen() {
  const s = state;
  if (s.freezeMaze > 0) s.freezeMaze--;
  else {
    s.movesSinceRegen++;
    if (s.movesSinceRegen >= regenThreshold()) regenerateMaze();
  }
}

function performPlayerMove(nx, ny, moveDir) {
  const s = state;
  const p = s.player;

  if (p.onMineId !== null) p.onMineId = null;
  p.x = nx; p.y = ny;
  if (moveDir) p.lastMoveDir = moveDir;
  s.moves++;

  // Ice slide
  let slideDir = moveDir;
  let iceIter = 0;
  while (slideDir && s.tiles[p.y][p.x] === 'ice' && iceIter < 12) {
    iceIter++;
    const def = DIRS[slideDir];
    const tx = p.x + def.dx, ty = p.y + def.dy;
    if (!inBounds(tx, ty) || s.walls[p.y][p.x][slideDir]) break;
    if (s.enemies.some(e => e.x === tx && e.y === ty)) break;
    p.x = tx; p.y = ty;
  }

  if (handleLandOn(p)) return;
  if (pendingPickup) return; // waiting for swap modal

  // Conveyor push
  const tileType = s.tiles[p.y][p.x];
  if (tileType === 'conveyor') {
    const cd = s.conveyorDirs[p.y][p.x];
    if (cd) {
      const def = DIRS[cd];
      const tx = p.x + def.dx, ty = p.y + def.dy;
      if (inBounds(tx, ty) && !s.walls[p.y][p.x][cd] && !s.enemies.some(e => e.x===tx && e.y===ty)) {
        p.x = tx; p.y = ty;
        if (handleLandOn(p)) return;
        if (pendingPickup) return;
      }
    }
  }

  if (!handleExit()) return;
  finishTurn();
}

function handleExit() {
  const s = state;
  const p = s.player;
  if (!same(s.exit, p)) return true;

  if (s.enemies.some(e => e.type === 'boss')) {
    showMessage(t('exitBossAlive'));
    return true;
  }

  // Key requirement
  if (s.keysNeeded > 0) {
    const keysInInv = s.player.inv.filter(x => x === 'key').length;
    if (keysInInv < s.keysNeeded) {
      showMessage(t('exitLocked'));
      return true;
    }
    // Consume required number of keys
    let remaining = s.keysNeeded;
    for (let i = 0; i < s.player.inv.length && remaining > 0; i++) {
      if (s.player.inv[i] === 'key') { s.player.inv[i] = null; remaining--; }
    }
    s.tiles[s.exit.y][s.exit.x] = 'normal';
    s.keysNeeded = 0;
  }

  s.transitioning = true;
  showMessage(t('roundCompleted', s.round));
  render(); renderInventory(); updateHUD();

  const exitDir = inferExitDir(s.exit, s.player.lastMoveDir);
  s.previousExitInfo = { exit: {...s.exit}, dir: exitDir };

  setTimeout(() => {
    if (s.round >= 10) {
      openShop();
    } else {
      cubeTransition(exitDir, () => { setupRound(s.round + 1); }).then(() => { s.transitioning = false; });
    }
  }, 400);
  return false;
}

function finishTurn() {
  const s = state;
  const p = s.player;
  // Mud
  if (s.tiles[p.y][p.x] === 'mud') p.skipNextTurn = true;
  advanceMazeRegen();
  enemyTurn();
  render(); renderInventory(); updateHUD();
}

function handleLandOn(p) {
  const s = state;
  checkTeleport(p);
  if (resolvePlayerEnemyCollision()) return true;

  // Mine
  const mine = s.mines.find(m => same(m, p));
  if (mine && p.onMineId !== mine.id) {
    s.mines = s.mines.filter(m => m.id !== mine.id);
    if (invincible) { showMessage(t('invincibleMine')); }
    else if (selectedIs('shield')) { consumeSelected(); showMessage(t('shieldBlockedMine')); renderInventory(); }
    else if (consumeHeart()) { showMessage(t('heartSaved')); }
    else {
      s.gameOver = true;
      showMessage(t('diedMine'));
      render(); renderInventory(); updateHUD();
      showRestart();
      return true;
    }
  }

  // Pit
  if (s.tiles[p.y][p.x] === 'pit') {
    if (invincible) showMessage(t('invinciblePit'));
    else if (selectedIs('shield')) { consumeSelected(); showMessage(t('shieldBlockedPit')); renderInventory(); }
    else if (consumeHeart()) { showMessage(t('heartSaved')); }
    else {
      s.gameOver = true;
      showMessage(t('diedPit'));
      render(); renderInventory(); updateHUD();
      showRestart();
      return true;
    }
  }

  // Item pickup
  const itemIdx = s.items.findIndex(it => same(it, p));
  if (itemIdx !== -1) {
    const item = s.items[itemIdx];
    if (item.type === 'slot') {
      s.player.invSize += 1;
      s.player.inv.push(null);
      s.items.splice(itemIdx, 1);
      showMessage(t('slotGained'));
    } else if (item.type === 'heart') {
      if (!s.player.hasHeart) {
        s.player.hasHeart = true;
        s.items.splice(itemIdx, 1);
        showMessage(t('heartGained'));
      }
    } else {
      const slotIdx = emptySlotIndex();
      if (slotIdx === -1) {
        // inventory full — open swap modal; key is mandatory
        pendingPickup = { worldIndex: itemIdx, type: item.type, mandatory: item.type === 'key' };
        openSwapModal();
        return false;
      }
      s.player.inv[slotIdx] = item.type;
      s.items.splice(itemIdx, 1);
      if (item.type === 'key') showMessage(t('gotKey'));
      else showMessage(t('pickedUp', itemName(item.type)));
    }
  }
  return false;
}

// =================== ENEMY DAMAGE ===================
function damageEnemy(e, source) {
  const s = state;
  // Shield absorbs one hit; enemy also skips its next turn so player can escape
  if (e.inv === 'shield') {
    e.inv = null;
    e.frozen = Math.max(e.frozen, 1);
    showMessage(t('enemyShieldBroke', enemyName(e.type)));
    return false;
  }
  const enemyPos = { x: e.x, y: e.y };
  if (e.type === 'boss') {
    e.hp -= 1;
    if (e.hp <= 0) {
      const droppedItem = e.inv;
      const idx = s.enemies.indexOf(e);
      if (idx !== -1) s.enemies.splice(idx, 1);
      s.killed++;
      if (source === 'mine') showMessage(t('bossKilledMine'));
      else if (source === 'pit') showMessage(t('bossKilledPit'));
      else if (source === 'crossbow') showMessage(t('crossbowKillBoss'));
      else showMessage(t('bossKilledKnife'));
      if (droppedItem) dropItemAt(enemyPos, droppedItem);
      return true;
    } else {
      e.frozen = 3;
      if (source === 'mine') showMessage(t('bossHitMine'));
      else if (source === 'pit') showMessage(t('bossHitPit'));
      else if (source === 'crossbow') showMessage(t('crossbowHitBoss'));
      else showMessage(t('bossHitNeedMore'));
      return false;
    }
  }
  // Regular/patrol/sniper/ghost dies
  const droppedItem = e.inv;
  const idx = s.enemies.indexOf(e);
  if (idx !== -1) s.enemies.splice(idx, 1);
  s.killed++;
  if (source === 'knife') showMessage(t('enemyKilledKnife'));
  else if (source === 'knife_on_player') showMessage(t('enemyRanIntoKnife'));
  else if (source === 'superknife') showMessage(t('superKilledEnemy'));
  else if (source === 'mine') showMessage(t('enemyToMine'));
  else if (source === 'pit') showMessage(t('enemyToPit'));
  else if (source === 'crossbow') showMessage(t('crossbowKill'));
  if (droppedItem) dropItemAt(enemyPos, droppedItem);
  return true;
}

function dropItemAt(pos, type) {
  const s = state;
  // Only drop normal items that persist; shields etc. are fine
  if (!['knife','superknife','clock','tilde','mine','stealthmine','random','shield','crossbow','amulet','restart','slot','key'].includes(type)) return;
  // Don't drop on pit/lock cells
  if (s.tiles[pos.y][pos.x] === 'pit' || s.tiles[pos.y][pos.x] === 'lock') return;
  // Prevent stacking if there's already an item here
  if (s.items.some(it => same(it, pos))) return;
  s.items.push({ type, x: pos.x, y: pos.y });
  s.seenItems.add(type);
  showMessage(t('enemyDropped', itemName(type)));
}

function pushEnemyAwayFrom(e, from) {
  const s = state;
  // Try preferred (the cell the enemy came from, if given)
  if (from && inBounds(from.x, from.y)) {
    const occupied = s.enemies.some(x => x !== e && x.x === from.x && x.y === from.y);
    if (!occupied && !(from.x === s.player.x && from.y === s.player.y)) {
      e.x = from.x; e.y = from.y; return;
    }
  }
  // Any neighbor not on player, not on another enemy
  for (const d of DIR_KEYS) {
    const nx = e.x + DIRS[d].dx, ny = e.y + DIRS[d].dy;
    if (!inBounds(nx, ny)) continue;
    if (nx === s.player.x && ny === s.player.y) continue;
    if (s.enemies.some(x => x !== e && x.x === nx && x.y === ny)) continue;
    e.x = nx; e.y = ny; return;
  }
  // No valid neighbor — enemy stays (worst case)
}

function resolvePlayerEnemyCollision() {
  const s = state;
  const p = s.player;
  for (let i = 0; i < s.enemies.length; i++) {
    const e = s.enemies[i];
    if (!same(e, p)) continue;

    if (e.type === 'boss') {
      if (selectedIs('superknife')) {
        consumeSelected();
        damageEnemy(e, 'superknife_boss');
        renderInventory();
        return false;
      }
      if (invincible) { damageEnemy(e, 'invincible'); showMessage(t('invincibleKilled', enemyName(e.type))); return false; }
      if (selectedIs('shield')) { consumeSelected(); e.frozen = Math.max(e.frozen, 1); pushEnemyAwayFrom(e, null); showMessage(t('shieldBlocked')); renderInventory(); return false; }
      if (consumeHeart()) { e.frozen = Math.max(e.frozen, 1); pushEnemyAwayFrom(e, null); showMessage(t('heartSaved')); return false; }
      s.gameOver = true;
      showMessage(t('killedByBoss'));
      render(); renderInventory(); updateHUD();
      showRestart();
      return true;
    }

    if (selectedIs('knife')) {
      consumeSelected();
      damageEnemy(e, 'knife');
      renderInventory();
      return false;
    }
    if (selectedIs('superknife')) {
      damageEnemy(e, 'superknife');
      return false;
    }
    if (invincible) { damageEnemy(e, 'invincible'); showMessage(t('invincibleKilled', enemyName(e.type))); return false; }
    if (selectedIs('shield')) { consumeSelected(); e.frozen = Math.max(e.frozen, 1); pushEnemyAwayFrom(e, null); showMessage(t('shieldBlocked')); renderInventory(); return false; }
    if (consumeHeart()) { e.frozen = Math.max(e.frozen, 1); pushEnemyAwayFrom(e, null); showMessage(t('heartSaved')); return false; }
    s.gameOver = true;
    showMessage(t('diedEnemy'));
    render(); renderInventory(); updateHUD();
    showRestart();
    return true;
  }
  return false;
}

function damageEnemyBoss(e, source) {
  // Legacy wrapper
  return damageEnemy(e, source);
}

function checkTeleport(entity) {
  const s = state;
  if (s.teleports.length === 2) {
    const [a, b] = s.teleports;
    if (same(entity, a)) { entity.x = b.x; entity.y = b.y; return; }
    if (same(entity, b)) { entity.x = a.x; entity.y = a.y; return; }
  }
  if (s.teleports2.length === 2) {
    const [a, b] = s.teleports2;
    if (same(entity, a)) { entity.x = b.x; entity.y = b.y; return; }
    if (same(entity, b)) { entity.x = a.x; entity.y = a.y; return; }
  }
}

function useItem() {
  const s = state;
  if (s.gameOver || s.transitioning) return;
  const p = s.player;
  const type = p.inv[p.selectedSlot];
  if (!type) { showMessage(t('selectedEmpty')); return; }

  switch (type) {
    case 'knife': showMessage(t('knifeAutoHint')); return;
    case 'shield': showMessage(t('shieldAutoHint')); return;
    case 'superknife': showMessage(t('superknifeAutoHint')); return;
    case 'clock':
      for (const e of s.enemies) e.frozen = Math.max(e.frozen, 3);
      s.freezeMaze = 3;
      consumeSelected();
      showMessage(t('clockActivated'));
      break;
    case 'tilde':
      pendingAction = 'tilde';
      showMessage(t('tildePrompt'));
      return;
    case 'crossbow':
      pendingAction = 'crossbow';
      showMessage(t('crossbowPrompt'));
      return;
    case 'mine':
    case 'stealthmine': {
      if (s.mines.some(m => same(m, p))) { showMessage(t('mineHere')); return; }
      const m = { x: p.x, y: p.y, id: ++s.mineIdCounter, placer: 'player', stealth: type === 'stealthmine' };
      s.mines.push(m);
      p.onMineId = m.id;
      consumeSelected();
      showMessage(type === 'stealthmine' ? t('stealthminePlaced') : t('minePlaced'));
      break;
    }
    case 'random':
      consumeSelected();
      regenerateMaze();
      showMessage(t('randomUsed'));
      break;
    case 'amulet':
      consumeSelected();
      regenerateMaze();
      showMessage(t('amuletUsed'));
      break;
    case 'restart':
      consumeSelected();
      showMessage(t('restartUsed'));
      s.transitioning = true;
      setTimeout(() => { setupRound(s.round); s.transitioning = false; }, 400);
      break;
  }
  render(); renderInventory(); updateHUD();
}

// =================== ENEMY AI ===================
function enemyKillPlayer(msgKey, attacker) {
  const s = state;
  if (invincible) { showMessage(t('invincibleKilled', enemyName('regular'))); return false; }
  if (selectedIs('shield')) {
    consumeSelected();
    if (attacker) attacker.frozen = Math.max(attacker.frozen, 1);
    showMessage(t('shieldBlocked'));
    renderInventory();
    return false;
  }
  if (consumeHeart()) {
    if (attacker) attacker.frozen = Math.max(attacker.frozen, 1);
    showMessage(t('heartSaved'));
    return false;
  }
  s.gameOver = true;
  showMessage(t(msgKey));
  showRestart();
  return true;
}

// Enemy stepped onto tile — returns true if removed from world
function enemyStepOnto(e) {
  const s = state;
  // Ghost doesn't interact with pits, mines, or items at all
  if (e.type === 'ghost') return false;

  // Pit: for boss -1 HP; others die
  if (s.tiles[e.y][e.x] === 'pit') {
    return damageEnemy(e, 'pit');
  }
  // Mine
  const mine = s.mines.find(m => same(m, e));
  if (mine && mine.id !== e.onMineId) {
    s.mines = s.mines.filter(m => m.id !== mine.id);
    return damageEnemy(e, 'mine');
  }
  // Pick up item (but enemies can't see/pickup keys, super-knives, or hearts except boss — they walk over)
  // Patrol enemies never pick up items at all
  const itemIdx = s.items.findIndex(it => same(it, e));
  if (itemIdx !== -1 && e.type !== 'patrol') {
    const item = s.items[itemIdx];
    if (item.type === 'key' || item.type === 'superknife') {
      // Invisible to enemies — item stays
    } else if (item.type === 'heart') {
      // Only boss can see/pick up hearts
      if (e.type === 'boss') {
        e.hp += 1;
        s.items.splice(itemIdx, 1);
        showMessage(t('bossHeartGained'));
      }
      // Other enemies walk over — heart stays
    } else if (!e.inv) {
      const usable = ['knife','tilde','mine','stealthmine','random','shield'];
      if (usable.includes(item.type)) {
        e.inv = item.type;
        s.items.splice(itemIdx, 1);
      } else if (['clock','slot','crossbow','amulet','restart'].includes(item.type)) {
        s.items.splice(itemIdx, 1); // destroyed by enemy walking over
      }
    }
  }
  return false;
}

function enemyCollidesWithPlayer(e, fromPos) {
  const s = state;
  const p = s.player;
  if (!same(e, p)) return false;

  if (e.type === 'boss') {
    if (selectedIs('superknife')) {
      consumeSelected();
      damageEnemy(e, 'superknife_boss');
      renderInventory();
      return true;
    }
    const killed = enemyKillPlayer('killedByBoss', e);
    if (!killed) pushEnemyAwayFrom(e, fromPos);
    return true;
  }

  if (selectedIs('knife')) {
    consumeSelected();
    damageEnemy(e, 'knife_on_player');
    renderInventory();
    return true;
  }
  if (selectedIs('superknife')) {
    damageEnemy(e, 'superknife');
    return true;
  }
  const killed = enemyKillPlayer('diedEnemy', e);
  if (!killed) pushEnemyAwayFrom(e, fromPos);
  return true;
}

function enemyTurn() {
  const s = state;
  if (s.gameOver) return;
  const p = s.player;

  // Snipers shoot first (stationary)
  for (const e of s.enemies) {
    if (e.type !== 'sniper') continue;
    if (e.frozen > 0) continue;
    const blockers = s.enemies.filter(x => x !== e);
    if (hasLineOfSight({x:e.x, y:e.y}, {x:p.x, y:p.y}, s.walls, blockers)) {
      if (enemyKillPlayer('diedSniper', e)) return;
    }
  }

  for (let i = s.enemies.length - 1; i >= 0; i--) {
    const e = s.enemies[i];
    if (!e) continue;
    if (e.frozen > 0) { e.frozen--; continue; }
    if (e.type === 'sniper') continue;

    // Mud: if enemy is currently on mud, set skip for next turn; also skip if flagged
    if (e.skipNextTurn) { e.skipNextTurn = false; showMessage(t('stuckInMudEnemy')); continue; }

    if (e.type === 'ghost') {
      e.skipNext = !e.skipNext;
      if (!e.skipNext) continue;
    }

    // Rational item use
    tryEnemyUseItem(e);

    let next = null;
    if (e.type === 'patrol') {
      const def = DIRS[e.dir];
      let nx = e.x + def.dx, ny = e.y + def.dy;
      let wrapped = null;
      if (!inBounds(nx, ny)) {
        wrapped = wrapCoords(e.x, e.y, e.dir);
        if (wrapped) { nx = wrapped.x; ny = wrapped.y; }
      }
      const isPit = inBounds(nx, ny) && s.tiles[ny][nx] === 'pit';
      if ((!inBounds(nx, ny) && !wrapped) || (inBounds(nx, ny) && !wrapped && s.walls[e.y][e.x][e.dir]) || isPit) {
        e.dir = DIRS[e.dir].opp;
      } else {
        next = { x: nx, y: ny };
      }
    } else if (e.type === 'ghost') {
      const blockedByOthers = s.enemies.filter(x => x !== e).map(x => ({x: x.x, y: x.y}));
      next = bfsNext({x:e.x, y:e.y}, {x:p.x, y:p.y}, s.walls, { ignoreWalls: true, blockedCells: blockedByOthers });
    } else if (e.type === 'regular' || e.type === 'boss') {
      const blockedByOthers = s.enemies.filter(x => x !== e).map(x => ({x: x.x, y: x.y}));
      next = bfsNext({x:e.x, y:e.y}, {x:p.x, y:p.y}, s.walls, { avoidPits: true, avoidMines: true, blockedCells: blockedByOthers, useTeleport: true });

      // Tilde usage: only if direct path blocked and breaking wall helps
      if (!next && e.inv === 'tilde') {
        const dx = p.x - e.x, dy = p.y - e.y;
        let preferDir = Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'e' : 'w') : (dy > 0 ? 's' : 'n');
        if (s.walls[e.y][e.x][preferDir]) {
          const def = DIRS[preferDir];
          const nx = e.x + def.dx, ny = e.y + def.dy;
          if (inBounds(nx, ny)) {
            s.walls[e.y][e.x][preferDir] = false;
            s.walls[ny][nx][def.opp] = false;
            e.inv = null;
            next = { x: nx, y: ny };
            showMessage(t('enemyBrokeWall'));
          }
        }
      }

      // Random: only if cannot reach player at all
      if (!next && e.inv === 'random') {
        e.inv = null;
        regenerateMaze();
        showMessage(t('enemyUsedRandom'));
        // Try again after regen
        next = bfsNext({x:e.x, y:e.y}, {x:p.x, y:p.y}, s.walls, { avoidPits: true, avoidMines: true });
      }
    }

    // If no path found — enemy must still move (pick any valid neighbor)
    if (!next) {
      const options = [];
      for (const d of DIR_KEYS) {
        const def = DIRS[d];
        let nx = e.x + def.dx, ny = e.y + def.dy;
        // Check walls (ghost ignores)
        const canPass = e.type === 'ghost' || !s.walls[e.y][e.x][d];
        if (!canPass) continue;
        if (!inBounds(nx, ny)) {
          const wrapped = wrapCoords(e.x, e.y, d);
          if (!wrapped) continue;
          nx = wrapped.x; ny = wrapped.y;
        }
        // Avoid pits and visible mines for non-ghost (but allow if nothing else)
        if (e.type !== 'ghost') {
          if (s.tiles[ny][nx] === 'pit') continue;
          if (s.mines.some(m => m.x === nx && m.y === ny && !m.stealth)) continue;
        }
        // Avoid stepping onto another enemy
        if (s.enemies.some(x => x !== e && x.x === nx && x.y === ny)) continue;
        options.push({ x: nx, y: ny });
      }
      if (options.length) {
        next = options[Math.floor(Math.random() * options.length)];
      }
    }

    if (!next) continue;

    if (e.onMineId !== null) e.onMineId = null;
    const fromX = e.x, fromY = e.y;
    e.x = next.x; e.y = next.y;

    // Ice slide for enemies (ghost doesn't slide)
    if (e.type !== 'ghost' && s.tiles[e.y][e.x] === 'ice') {
      const dx = e.x - fromX, dy = e.y - fromY;
      let slideDir = null;
      if (dx > 0) slideDir = 'e';
      else if (dx < 0) slideDir = 'w';
      else if (dy > 0) slideDir = 's';
      else if (dy < 0) slideDir = 'n';
      let iceIter = 0;
      while (slideDir && s.tiles[e.y][e.x] === 'ice' && iceIter < 12) {
        iceIter++;
        const def = DIRS[slideDir];
        const tx = e.x + def.dx, ty = e.y + def.dy;
        if (!inBounds(tx, ty) || s.walls[e.y][e.x][slideDir]) break;
        if (s.enemies.some(x => x !== e && x.x === tx && x.y === ty)) break;
        if (tx === s.player.x && ty === s.player.y) break;
        e.x = tx; e.y = ty;
      }
    }

    checkTeleport(e);
    if (enemyStepOnto(e)) continue;
    // Mud effect
    if (s.tiles[e.y][e.x] === 'mud') e.skipNextTurn = true;
    if (enemyCollidesWithPlayer(e, {x: fromX, y: fromY})) { if (s.gameOver) return; continue; }
  }
}

function tryEnemyUseItem(e) {
  const s = state;
  const p = s.player;
  // Mine: only place if player is exactly 1 cell away AND on a cell adjacent to enemy via open path
  if ((e.inv === 'mine' || e.inv === 'stealthmine') && manhattan(e, p) === 1) {
    // Player must be able to reach enemy's current cell (will step on mine next)
    const reachable = bfsNext({x:p.x, y:p.y}, {x:e.x, y:e.y}, s.walls);
    if (reachable && reachable.x === e.x && reachable.y === e.y) {
      if (!s.mines.some(m => same(m, e))) {
        const m = { x: e.x, y: e.y, id: ++s.mineIdCounter, placer: 'enemy', stealth: e.inv === 'stealthmine' };
        s.mines.push(m);
        e.onMineId = m.id;
        e.inv = null;
      }
    }
  }
}

// =================== SHOP ===================
function openShop() {
  const s = state;
  const modal = document.getElementById('modal');
  document.getElementById('modalTitle').textContent = t('shopTitle', s.round);
  const pool = ['knife','shield','clock','tilde','crossbow','amulet','restart','random','mine','stealthmine','slot'];
  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  const choices = shuffled.slice(0, 3);
  const c = document.getElementById('modalContent');
  let html = `<div>${t('shopPrompt')}</div><div class="shop-choices">`;
  for (const type of choices) {
    html += `<div class="shop-choice" data-item="${type}"><div class="shop-emoji">${itemEmoji(type)}</div><div class="shop-name">${itemName(type)}</div><div class="shop-desc">${t('hint_' + type)}</div></div>`;
  }
  html += `</div><button class="shop-skip">${t('shopSkip')}</button>`;
  // Current inventory preview (clickable slots to change selection)
  html += `<div class="swap-section-label" style="margin-top:14px">${t('currentInv')}:</div>`;
  html += `<div class="swap-choices" id="shopInvPreview">`;
  for (let i = 0; i < s.player.inv.length; i++) {
    const cur = s.player.inv[i];
    const isSel = i === s.player.selectedSlot;
    html += `<div class="swap-choice${isSel ? ' swap-new' : ''}" data-sel="${i}" title="${cur ? itemName(cur) : ''}"><div class="swap-emoji">${cur ? itemEmoji(cur) : '·'}</div><div class="swap-name">${i+1}</div></div>`;
  }
  html += `</div>`;
  c.innerHTML = html;
  c.querySelectorAll('.shop-choice').forEach(el => {
    el.addEventListener('click', () => {
      const type = el.getAttribute('data-item');
      if (type === 'slot') {
        s.player.invSize += 1;
        s.player.inv.push(null);
        showMessage(t('slotGained'));
      } else {
        const slotIdx = emptySlotIndex();
        if (slotIdx === -1) {
          // Full — replace selected slot (user previewed which to replace)
          s.player.inv[s.player.selectedSlot] = type;
        } else {
          s.player.inv[slotIdx] = type;
        }
        showMessage(t('shopReceived', itemName(type)));
      }
      s.seenItems.add(type);
      closeShop();
    });
  });
  c.querySelector('.shop-skip').addEventListener('click', closeShop);
  c.querySelectorAll('[data-sel]').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.getAttribute('data-sel'), 10);
      s.player.selectedSlot = idx;
      // Re-highlight previews
      c.querySelectorAll('[data-sel]').forEach(x => {
        const i = parseInt(x.getAttribute('data-sel'), 10);
        x.classList.toggle('swap-new', i === idx);
      });
      renderInventory();
      render();
    });
  });
  modal.classList.add('open');
}
function closeShop() {
  const s = state;
  document.getElementById('modal').classList.remove('open');
  const exitDir = s.previousExitInfo ? s.previousExitInfo.dir : 'n';
  cubeTransition(exitDir, () => { setupRound(s.round + 1); }).then(() => { s.transitioning = false; });
}

// =================== SWAP MODAL ===================
function openSwapModal() {
  const s = state;
  s.transitioning = true;
  const modal = document.getElementById('modal');
  document.getElementById('modalTitle').textContent = t('swapTitle');
  const c = document.getElementById('modalContent');
  const newType = pendingPickup.type;
  const mandatory = pendingPickup.mandatory;
  let html = `<div style="font-size:12px;color:#555;margin-bottom:6px">${mandatory ? t('swapMandatory') : t('swapPrompt')}</div>`;
  html += `<div class="swap-section-label">${t('newItem')}:</div>`;
  html += `<div class="swap-choices"><div class="swap-choice swap-new"><div class="swap-emoji">${itemEmoji(newType)}</div><div class="swap-name">${itemName(newType)}</div></div></div>`;
  html += `<div class="swap-section-label">${t('replaceSlot')}:</div><div class="swap-choices">`;
  for (let i = 0; i < s.player.inv.length; i++) {
    const cur = s.player.inv[i];
    if (!cur) continue;
    // Can't replace a key with a key
    if (newType === 'key' && cur === 'key') continue;
    html += `<div class="swap-choice" data-slot="${i}" title="${itemName(cur)}"><div class="swap-emoji">${itemEmoji(cur)}</div><div class="swap-name">${i+1}</div></div>`;
  }
  html += `</div>`;
  if (!mandatory) html += `<button class="swap-skip">${t('swapSkip')}</button>`;
  c.innerHTML = html;

  c.querySelectorAll('.swap-choice[data-slot]').forEach(el => {
    el.addEventListener('click', () => {
      const slotIdx = parseInt(el.getAttribute('data-slot'), 10);
      const oldItem = s.player.inv[slotIdx];
      s.player.inv[slotIdx] = pendingPickup.type;
      // New item removed from world
      const newItemPos = { x: s.items[pendingPickup.worldIndex].x, y: s.items[pendingPickup.worldIndex].y };
      s.items.splice(pendingPickup.worldIndex, 1);
      // Old item drops on the floor at player position (which equals new item's old position)
      if (oldItem && oldItem !== 'key') {
        // Avoid stacking if somehow something else there already
        if (!s.items.some(it => it.x === newItemPos.x && it.y === newItemPos.y)) {
          s.items.push({ type: oldItem, x: newItemPos.x, y: newItemPos.y });
        }
      }
      if (pendingPickup.type === 'key') showMessage(t('gotKey'));
      else showMessage(t('pickedUp', itemName(pendingPickup.type)));
      closeSwap(true);
    });
  });
  const skipBtn = c.querySelector('.swap-skip');
  if (skipBtn) skipBtn.addEventListener('click', () => closeSwap(false));
  modal.classList.add('open');
}
function closeSwap(didPickup) {
  const s = state;
  pendingPickup = null;
  document.getElementById('modal').classList.remove('open');
  s.transitioning = false;
  // Continue the interrupted turn: exit check, mud, regen, enemy turn
  if (!handleExit()) { render(); renderInventory(); updateHUD(); return; }
  finishTurn();
}

// =================== RENDER ===================
let canvas, ctx;

function render() {
  const s = state;
  ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(PAD, PAD, GRID * CELL, GRID * CELL);

  // Tiles
  for (let y = 0; y < GRID; y++) {
    for (let x = 0; x < GRID; x++) {
      const tt = s.tiles[y][x];
      const px = PAD + x * CELL, py = PAD + y * CELL;
      if (tt === 'ice') { ctx.fillStyle = '#d6ecff'; ctx.fillRect(px, py, CELL, CELL); }
      else if (tt === 'mud') { ctx.fillStyle = '#b08968'; ctx.fillRect(px, py, CELL, CELL); }
      else if (tt === 'conveyor') {
        ctx.fillStyle = '#eef2ff';
        ctx.fillRect(px, py, CELL, CELL);
        const cd = s.conveyorDirs[y][x];
        ctx.fillStyle = '#5c6bc0';
        ctx.font = `${Math.floor(CELL*0.6)}px sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        const arrow = cd === 'n' ? '↑' : cd === 'e' ? '→' : cd === 's' ? '↓' : '←';
        ctx.fillText(arrow, px + CELL/2, py + CELL/2 + 1);
      } else if (tt === 'lock') {
        ctx.fillStyle = '#27ae60';
        ctx.beginPath();
        ctx.arc(px + CELL/2, py + CELL/2, CELL/2 - 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.font = `${Math.floor(CELL*0.5)}px sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('🔒', px + CELL/2, py + CELL/2 + 1);
      }
    }
  }

  // Exit as green circle; special overlays for boss/lock
  if (s.tiles[s.exit.y][s.exit.x] !== 'lock') {
    ctx.fillStyle = '#27ae60';
    ctx.beginPath();
    ctx.arc(PAD + s.exit.x * CELL + CELL/2, PAD + s.exit.y * CELL + CELL/2, CELL/2 - 3, 0, Math.PI * 2);
    ctx.fill();
    // Boss alive — show 👹 inside the exit circle
    if (s.enemies.some(e => e.type === 'boss')) {
      ctx.font = `${Math.floor(CELL * 0.5)}px -apple-system, "Segoe UI Emoji", sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('👹', PAD + s.exit.x * CELL + CELL/2, PAD + s.exit.y * CELL + CELL/2 + 1);
    }
  }

  // Pits
  ctx.fillStyle = '#000';
  for (let y = 0; y < GRID; y++) {
    for (let x = 0; x < GRID; x++) {
      if (s.tiles[y][x] === 'pit') {
        ctx.fillRect(PAD + x * CELL + 4, PAD + y * CELL + 4, CELL - 8, CELL - 8);
      }
    }
  }

  // Teleports (blue pair)
  if (s.teleports.length === 2) {
    ctx.strokeStyle = '#5dade2';
    ctx.fillStyle = '#d6eaf8';
    ctx.lineWidth = 2;
    for (const tp of s.teleports) {
      const cx = PAD + tp.x * CELL + CELL/2, cy = PAD + tp.y * CELL + CELL/2;
      ctx.beginPath(); ctx.arc(cx, cy, CELL * 0.32, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
    }
  }
  // Second teleports (light orange pair)
  if (s.teleports2.length === 2) {
    ctx.strokeStyle = '#f39c12';
    ctx.fillStyle = '#fff3cd';
    ctx.lineWidth = 2;
    for (const tp of s.teleports2) {
      const cx = PAD + tp.x * CELL + CELL/2, cy = PAD + tp.y * CELL + CELL/2;
      ctx.beginPath(); ctx.arc(cx, cy, CELL * 0.32, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
    }
  }

  // Mines
  for (const m of s.mines) {
    const cx = PAD + m.x * CELL + CELL/2, cy = PAD + m.y * CELL + CELL/2;
    if (m.stealth) {
      // Stealth mine — dashed / pattern to distinguish for player
      ctx.fillStyle = '#4a4a4a';
      ctx.beginPath(); ctx.arc(cx, cy, CELL * 0.22, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#888';
      ctx.setLineDash([3, 3]);
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(cx, cy, CELL * 0.30, 0, Math.PI * 2); ctx.stroke();
      ctx.setLineDash([]);
      ctx.font = `${Math.floor(CELL * 0.3)}px sans-serif`;
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('?', cx, cy + 1);
    } else {
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath(); ctx.arc(cx, cy, CELL * 0.22, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 2;
      for (let a = 0; a < 4; a++) {
        const ang = a * Math.PI / 2 + Math.PI / 4;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(ang) * CELL * 0.22, cy + Math.sin(ang) * CELL * 0.22);
        ctx.lineTo(cx + Math.cos(ang) * CELL * 0.34, cy + Math.sin(ang) * CELL * 0.34);
        ctx.stroke();
      }
    }
  }

  // Items
  ctx.fillStyle = '#000';
  ctx.font = `${Math.floor(CELL * 0.55)}px -apple-system, "Segoe UI Emoji", sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (const it of s.items) {
    ctx.fillText(itemEmoji(it.type), PAD + it.x * CELL + CELL/2, PAD + it.y * CELL + CELL/2 + 2);
  }

  // Sniper LOS preview
  for (const e of s.enemies) {
    if (e.type !== 'sniper' || e.frozen > 0) continue;
    const blockers = s.enemies.filter(x => x !== e);
    if (hasLineOfSight({x:e.x,y:e.y}, {x:s.player.x,y:s.player.y}, s.walls, blockers)) {
      ctx.strokeStyle = 'rgba(231,76,60,0.7)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(PAD + e.x * CELL + CELL/2, PAD + e.y * CELL + CELL/2);
      ctx.lineTo(PAD + s.player.x * CELL + CELL/2, PAD + s.player.y * CELL + CELL/2);
      ctx.stroke();
    }
  }

  // Enemies
  for (const e of s.enemies) {
    const cx = PAD + e.x * CELL + CELL/2, cy = PAD + e.y * CELL + CELL/2;
    if (e.type === 'boss') {
      // White square background
      ctx.fillStyle = '#fff';
      ctx.fillRect(PAD + e.x * CELL + 2, PAD + e.y * CELL + 2, CELL - 4, CELL - 4);
      // Boss emoji (same icon used on exit)
      ctx.font = `${Math.floor(CELL * 0.6)}px -apple-system, "Segoe UI Emoji", sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('👹', cx, cy + 1);
      // HP as concentric brown rings
      ctx.strokeStyle = '#8b4513';
      ctx.lineWidth = 2;
      for (let h = 0; h < e.hp; h++) {
        const r = CELL * 0.38 + h * 3;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.stroke();
      }
      if (e.frozen > 0) { ctx.strokeStyle = '#2874e7'; ctx.lineWidth = 3; ctx.strokeRect(PAD + e.x*CELL+2, PAD + e.y*CELL+2, CELL-4, CELL-4); }
    } else {
      let fill = '#e74c3c';
      if (e.type === 'patrol') fill = '#e67e22';
      else if (e.type === 'sniper') fill = '#f5a05c'; // lighter tone than patrol
      else if (e.type === 'ghost') fill = '#bdc3c7';
      if (e.frozen > 0) fill = '#a0c4ff';
      ctx.fillStyle = fill;
      if (e.type === 'ghost') {
        ctx.globalAlpha = 0.7;
        ctx.fillRect(PAD + e.x*CELL + 5, PAD + e.y*CELL + 5, CELL-10, CELL-10);
        ctx.globalAlpha = 1;
      } else {
        ctx.fillRect(PAD + e.x*CELL + 5, PAD + e.y*CELL + 5, CELL-10, CELL-10);
      }
      // Inventory icon (takes priority over type badge)
      if (e.inv) {
        ctx.font = `${Math.floor(CELL * 0.34)}px -apple-system, "Segoe UI Emoji", sans-serif`;
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(itemEmoji(e.inv), cx, cy + 1);
      } else if (e.type === 'patrol') {
        // Double-headed arrow along patrol axis
        ctx.strokeStyle = '#fff';
        ctx.fillStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        const armLen = CELL * 0.22;
        const headSize = CELL * 0.09;
        const vertical = (e.dir === 'n' || e.dir === 's');
        if (vertical) {
          ctx.beginPath();
          ctx.moveTo(cx, cy - armLen);
          ctx.lineTo(cx, cy + armLen);
          ctx.stroke();
          // top arrow
          ctx.beginPath();
          ctx.moveTo(cx, cy - armLen);
          ctx.lineTo(cx - headSize, cy - armLen + headSize);
          ctx.lineTo(cx + headSize, cy - armLen + headSize);
          ctx.closePath(); ctx.fill();
          // bottom arrow
          ctx.beginPath();
          ctx.moveTo(cx, cy + armLen);
          ctx.lineTo(cx - headSize, cy + armLen - headSize);
          ctx.lineTo(cx + headSize, cy + armLen - headSize);
          ctx.closePath(); ctx.fill();
        } else {
          ctx.beginPath();
          ctx.moveTo(cx - armLen, cy);
          ctx.lineTo(cx + armLen, cy);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(cx - armLen, cy);
          ctx.lineTo(cx - armLen + headSize, cy - headSize);
          ctx.lineTo(cx - armLen + headSize, cy + headSize);
          ctx.closePath(); ctx.fill();
          ctx.beginPath();
          ctx.moveTo(cx + armLen, cy);
          ctx.lineTo(cx + armLen - headSize, cy - headSize);
          ctx.lineTo(cx + armLen - headSize, cy + headSize);
          ctx.closePath(); ctx.fill();
        }
      } else if (e.type === 'sniper') {
        ctx.font = `${Math.floor(CELL * 0.38)}px -apple-system, "Segoe UI Emoji", sans-serif`;
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('🎯', cx, cy + 1);
      } else if (e.type === 'ghost') {
        ctx.font = `${Math.floor(CELL * 0.38)}px -apple-system, "Segoe UI Emoji", sans-serif`;
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('👻', cx, cy + 1);
      }
      if (e.frozen > 0 && e.type !== 'boss') {
        ctx.strokeStyle = '#2874e7'; ctx.lineWidth = 2;
        ctx.strokeRect(PAD + e.x*CELL + 4, PAD + e.y*CELL + 4, CELL-8, CELL-8);
      }
    }
  }

  // Player
  const pcx = PAD + s.player.x * CELL + CELL/2, pcy = PAD + s.player.y * CELL + CELL/2;
  if (s.player.hasHeart) {
    ctx.strokeStyle = '#e74c3c';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(pcx, pcy, CELL * 0.44, 0, Math.PI * 2); ctx.stroke();
  }
  if (invincible) {
    ctx.strokeStyle = '#f39c12'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(pcx, pcy, CELL * 0.45, 0, Math.PI * 2); ctx.stroke();
  }
  if (control === 'tilt') {
    const remaining = tiltCooldown - Date.now();
    if (remaining > 0) {
      const frac = remaining / 2000;
      ctx.strokeStyle = 'rgba(128,128,128,0.6)'; ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(pcx, pcy, CELL * 0.45, -Math.PI/2, -Math.PI/2 + Math.PI*2*frac);
      ctx.stroke();
    }
  }
  ctx.fillStyle = '#2874e7';
  ctx.beginPath(); ctx.arc(pcx, pcy, CELL * 0.36, 0, Math.PI * 2); ctx.fill();

  const sel = selectedItem();
  if (sel) {
    ctx.font = `${Math.floor(CELL * 0.4)}px -apple-system, "Segoe UI Emoji", sans-serif`;
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(itemEmoji(sel), pcx, pcy + 1);
  }

  // Walls
  ctx.strokeStyle = '#000';
  ctx.lineCap = 'square';
  ctx.lineWidth = 2;
  for (let y = 0; y < GRID; y++) {
    for (let x = 0; x < GRID; x++) {
      const cx = PAD + x * CELL, cy = PAD + y * CELL;
      const w = s.walls[y][x];
      if (w.n && y > 0) { ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + CELL, cy); ctx.stroke(); }
      if (w.w && x > 0) { ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx, cy + CELL); ctx.stroke(); }
    }
  }
  ctx.lineWidth = 3;
  // Outer border with wavy segments where pacman wraps are active
  const gapStart = Math.floor(GRID / 2) - 1;
  const gapEnd = Math.floor(GRID / 2) + 1;
  ctx.strokeStyle = '#000';

  const drawWavyH = (x1, x2, y) => {
    ctx.save();
    ctx.lineWidth = 2;
    ctx.strokeStyle = '#2874e7';
    ctx.beginPath();
    const amp = 3, period = 8;
    ctx.moveTo(x1, y);
    for (let x = x1; x <= x2; x += 1) {
      const yy = y + Math.sin((x - x1) / period * Math.PI * 2) * amp;
      ctx.lineTo(x, yy);
    }
    ctx.stroke();
    ctx.restore();
  };
  const drawWavyV = (y1, y2, x) => {
    ctx.save();
    ctx.lineWidth = 2;
    ctx.strokeStyle = '#2874e7';
    ctx.beginPath();
    const amp = 3, period = 8;
    ctx.moveTo(x, y1);
    for (let y = y1; y <= y2; y += 1) {
      const xx = x + Math.sin((y - y1) / period * Math.PI * 2) * amp;
      ctx.lineTo(xx, y);
    }
    ctx.stroke();
    ctx.restore();
  };

  // Top edge
  if (s.wrapVertical) {
    ctx.beginPath(); ctx.moveTo(PAD, PAD); ctx.lineTo(PAD + gapStart * CELL, PAD); ctx.stroke();
    drawWavyH(PAD + gapStart * CELL, PAD + gapEnd * CELL, PAD);
    ctx.beginPath(); ctx.moveTo(PAD + gapEnd * CELL, PAD); ctx.lineTo(PAD + GRID * CELL, PAD); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.moveTo(PAD, PAD); ctx.lineTo(PAD + GRID * CELL, PAD); ctx.stroke();
  }
  // Bottom edge
  if (s.wrapVertical) {
    ctx.beginPath(); ctx.moveTo(PAD, PAD + GRID * CELL); ctx.lineTo(PAD + gapStart * CELL, PAD + GRID * CELL); ctx.stroke();
    drawWavyH(PAD + gapStart * CELL, PAD + gapEnd * CELL, PAD + GRID * CELL);
    ctx.beginPath(); ctx.moveTo(PAD + gapEnd * CELL, PAD + GRID * CELL); ctx.lineTo(PAD + GRID * CELL, PAD + GRID * CELL); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.moveTo(PAD, PAD + GRID * CELL); ctx.lineTo(PAD + GRID * CELL, PAD + GRID * CELL); ctx.stroke();
  }
  // Left edge
  if (s.wrapHorizontal) {
    ctx.beginPath(); ctx.moveTo(PAD, PAD); ctx.lineTo(PAD, PAD + gapStart * CELL); ctx.stroke();
    drawWavyV(PAD + gapStart * CELL, PAD + gapEnd * CELL, PAD);
    ctx.beginPath(); ctx.moveTo(PAD, PAD + gapEnd * CELL); ctx.lineTo(PAD, PAD + GRID * CELL); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.moveTo(PAD, PAD); ctx.lineTo(PAD, PAD + GRID * CELL); ctx.stroke();
  }
  // Right edge
  if (s.wrapHorizontal) {
    ctx.beginPath(); ctx.moveTo(PAD + GRID * CELL, PAD); ctx.lineTo(PAD + GRID * CELL, PAD + gapStart * CELL); ctx.stroke();
    drawWavyV(PAD + gapStart * CELL, PAD + gapEnd * CELL, PAD + GRID * CELL);
    ctx.beginPath(); ctx.moveTo(PAD + GRID * CELL, PAD + gapEnd * CELL); ctx.lineTo(PAD + GRID * CELL, PAD + GRID * CELL); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.moveTo(PAD + GRID * CELL, PAD); ctx.lineTo(PAD + GRID * CELL, PAD + GRID * CELL); ctx.stroke();
  }

  // Fog
  if (s.fogOfWar) {
    const fogR = FOG_RADIUS_CELLS * CELL;
    const grad = ctx.createRadialGradient(pcx, pcy, fogR * 0.7, pcx, pcy, fogR);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(0,0,0,0.88)');
    ctx.fillStyle = grad;
    ctx.fillRect(PAD, PAD, GRID * CELL, GRID * CELL);
  }

  const keysHeld = s.player.inv.filter(x => x === 'key').length;
  // key counter now displayed in HTML status bar, not on canvas
}

function renderInventory() {
  const s = state;
  const container = document.getElementById('invSlots');
  container.innerHTML = '';
  for (let i = 0; i < s.player.inv.length; i++) {
    const item = s.player.inv[i];
    const slot = document.createElement('div');
    slot.className = 'slot' + (item ? '' : ' empty') + (i === s.player.selectedSlot ? ' selected' : '');
    slot.innerHTML = `<span class="idx">${i < 9 ? (i+1) : ''}</span>${item ? itemEmoji(item) : '·'}`;
    slot.title = item ? `${itemName(item)} — ${t('hint_' + item)}` : '';
    slot.addEventListener('click', () => { state.player.selectedSlot = i; renderInventory(); render(); });
    container.appendChild(slot);
  }
  updateStatusBar();
}

function updateStatusBar() {
  const s = state;
  const keyEl = document.getElementById('keyStatus');
  const bar = document.getElementById('statusBar');
  if (keyEl) {
    const keysHeld = s.player.inv.filter(x => x === 'key').length;
    keyEl.textContent = s.keysNeeded > 0 ? `🔑 ${keysHeld} / ${s.keysNeeded}` : '';
  }
  if (bar) {
    const empty = !keyEl || !keyEl.textContent;
    bar.style.display = empty ? 'none' : 'flex';
  }
}

function updateHUD() {
  document.getElementById('moves').textContent = state.moves;
  document.getElementById('round').textContent = state.round;
  document.getElementById('killed').textContent = state.killed;
  updateStatusBar();
}

const eventLog = [];
const EVENT_LOG_MAX = 5;

function logEvent(text) {
  if (!text) return;
  eventLog.push(text);
  if (eventLog.length > EVENT_LOG_MAX) eventLog.shift();
  renderEventLog();
}

function renderEventLog() {
  const el = document.getElementById('eventLog');
  if (!el) return;
  el.innerHTML = eventLog.map(line => `<div class="log-entry">${line}</div>`).join('');
  el.scrollTop = el.scrollHeight;
}

let msgTimer = null;
function showMessage(text) {
  const el = document.getElementById('message');
  el.textContent = text;
  if (msgTimer) clearTimeout(msgTimer);
  msgTimer = setTimeout(() => { el.textContent = ''; }, 2800);
  logEvent(text);
}
function showRestart() { document.getElementById('restartBtn').style.display = 'inline-block'; }

// =================== INFO MODAL ===================
function openInfo() {
  const s = state;
  document.getElementById('modalTitle').textContent = t('infoTitle');
  const c = document.getElementById('modalContent');
  let html = '';
  html += `<div class="info-row"><div class="info-icon">🎯</div><div class="info-body"><div class="info-title">${t('roundObjective', s.round)}</div></div></div>`;

  html += `<h3>${t('enemies')}</h3>`;
  const enemyList = [...s.seenEnemies];
  if (!enemyList.length) html += `<div class="info-empty">${t('notSeen')}</div>`;
  else for (const tt of enemyList) {
    html += `<div class="info-row"><div class="info-icon">${ENEMY_META[tt].emoji}</div><div class="info-body"><div class="info-title">${enemyName(tt)}</div><div class="info-desc">${t('hint_' + tt)}</div></div></div>`;
  }

  html += `<h3>${t('items')}</h3>`;
  const itemList = [...s.seenItems];
  if (!itemList.length) html += `<div class="info-empty">${t('noItems')}</div>`;
  else for (const tt of itemList) {
    html += `<div class="info-row"><div class="info-icon">${itemEmoji(tt)}</div><div class="info-body"><div class="info-title">${itemName(tt)}</div><div class="info-desc">${t('hint_' + tt)}</div></div></div>`;
  }

  html += `<h3>${t('tiles')}</h3>`;
  const tileList = [...s.seenTiles].filter(tn => TILE_META[tn]);
  if (!tileList.length) html += `<div class="info-empty">${t('noTiles')}</div>`;
  else for (const tt of tileList) {
    html += `<div class="info-row"><div class="info-icon">${TILE_META[tt].emoji}</div><div class="info-body"><div class="info-title">${tileName(tt)}</div><div class="info-desc">${t('hint_' + tt)}</div></div></div>`;
  }

  html += `<h3>${t('controls')}</h3>`;
  html += `<div class="info-row"><div class="info-icon">⌨️</div><div class="info-body"><div class="info-desc">${t('controlsInfo1')}</div></div></div>`;
  html += `<div class="info-row"><div class="info-icon">📱</div><div class="info-body"><div class="info-desc">${t('controlsInfo2')}</div></div></div>`;
  c.innerHTML = html;
  document.getElementById('modal').classList.add('open');
}
function closeInfo() { document.getElementById('modal').classList.remove('open'); }

// =================== INPUT ===================
function bindKeyboard() {
  window.addEventListener('keydown', (e) => {
    if (!state || state.gameOver || state.transitioning) return;
    let dir = null;
    if (control === 'arrows') {
      if (e.key === 'ArrowUp') dir = 'n';
      else if (e.key === 'ArrowDown') dir = 's';
      else if (e.key === 'ArrowLeft') dir = 'w';
      else if (e.key === 'ArrowRight') dir = 'e';
    } else if (control === 'wasd') {
      const k = e.key.toLowerCase();
      if (k === 'w' || k === 'ц') dir = 'n';
      else if (k === 's' || k === 'ы' || k === 'і') dir = 's';
      else if (k === 'a' || k === 'ф') dir = 'w';
      else if (k === 'd' || k === 'в') dir = 'e';
    }
    if (dir) { e.preventDefault(); tryMovePlayer(dir); return; }
    if (e.key === ' ' || e.code === 'Space' || e.key === 'Enter') { e.preventDefault(); useItem(); return; }
    if (e.key >= '1' && e.key <= '9') {
      const n = parseInt(e.key, 10) - 1;
      if (n < state.player.inv.length) { state.player.selectedSlot = n; renderInventory(); render(); }
    }
  });
}

function bindTouch() {
  let touchStartX = 0, touchStartY = 0;
  let lastTapTime = 0;

  const canvas = document.getElementById('canvas');

  canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) return;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  canvas.addEventListener('touchend', (e) => {
    if (!state || state.gameOver || state.transitioning) return;
    if (document.getElementById('modal').classList.contains('open')) return;
    const touch = e.changedTouches[0];
    if (!touch) return;
    const dx = touch.clientX - touchStartX, dy = touch.clientY - touchStartY;
    const isSwipe = Math.abs(dx) > 22 || Math.abs(dy) > 22;

    if (control === 'swipe' && isSwipe) {
      let dir;
      if (Math.abs(dx) > Math.abs(dy)) dir = dx > 0 ? 'e' : 'w';
      else dir = dy > 0 ? 's' : 'n';
      tryMovePlayer(dir);
      return;
    }
    if ((control === 'swipe' || control === 'tilt') && !isSwipe) {
      const now = Date.now();
      if (now - lastTapTime < 380) { useItem(); lastTapTime = 0; }
      else lastTapTime = now;
    }
  });
}

function startTiltAnimation() {
  if (tiltAnimationFrame) return;
  const tick = () => {
    if (control !== 'tilt') { tiltAnimationFrame = null; return; }
    if (tiltCooldown > Date.now()) { render(); tiltAnimationFrame = requestAnimationFrame(tick); }
    else { render(); tiltAnimationFrame = null; }
  };
  tiltAnimationFrame = requestAnimationFrame(tick);
}

function bindTilt() {
  const handler = (e) => {
    if (control !== 'tilt') return;
    if (!state || state.gameOver || state.transitioning) return;
    const now = Date.now();
    if (now < tiltCooldown) return;
    const beta = e.beta || 0, gamma = e.gamma || 0;
    const threshold = 30;
    const b = beta - 30;
    let dir = null;
    if (Math.abs(gamma) > Math.abs(b)) {
      if (gamma > threshold) dir = 'e';
      else if (gamma < -threshold) dir = 'w';
    } else {
      if (b > threshold) dir = 's';
      else if (b < -threshold) dir = 'n';
    }
    if (dir) { tiltCooldown = now + 2000; tryMovePlayer(dir); startTiltAnimation(); }
  };
  window.addEventListener('deviceorientation', handler);
  window.addEventListener('deviceorientationabsolute', handler);
}

function toggleInvincible() {
  invincible = !invincible;
  const word = document.querySelector('#gameTitle .title-word');
  if (word) word.classList.toggle('struck', invincible);
  showMessage(invincible ? t('godmodeOn') : t('godmodeOff'));
  render();
}

let titleTapCount = 0;
let titleTapTimer = null;
function onTitleTap() {
  titleTapCount++;
  clearTimeout(titleTapTimer);
  titleTapTimer = setTimeout(() => { titleTapCount = 0; }, 1500);
  if (titleTapCount >= 5) {
    titleTapCount = 0;
    clearTimeout(titleTapTimer);
    toggleInvincible();
  }
}

let lastWordTapCount = 0;
let lastWordTapTimer = null;
function onLastWordTap() {
  lastWordTapCount++;
  clearTimeout(lastWordTapTimer);
  lastWordTapTimer = setTimeout(() => { lastWordTapCount = 0; }, 1500);
  if (lastWordTapCount >= 5) {
    lastWordTapCount = 0;
    clearTimeout(lastWordTapTimer);
    skipRound();
  }
}

function skipRound() {
  const s = state;
  if (s.gameOver || s.transitioning) return;
  s.transitioning = true;
  // Use last move dir or default 'n' for cube animation
  const exitDir = s.player.lastMoveDir || 'n';
  s.previousExitInfo = { exit: {...s.player}, dir: exitDir };
  showMessage(t('roundSkipped'));
  if (s.round >= 10) {
    setTimeout(() => openShop(), 300);
  } else {
    cubeTransition(exitDir, () => { setupRound(s.round + 1); }).then(() => { s.transitioning = false; });
  }
}

function cycleControl() {
  const cycle = IS_MOBILE ? CONTROL_CYCLE_MOBILE : CONTROL_CYCLE_DESKTOP;
  const idx = cycle.indexOf(control);
  const next = cycle[(idx + 1) % cycle.length];
  setControl(next);
}

function setControl(c) {
  control = c;
  pendingAction = null;
  document.getElementById('ctrlBtn').textContent = controlLabel(c);
  if (c === 'tilt') {
    if (!window.isSecureContext) { showMessage(t('tiltHttpsRequired')); return; }
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission().then(p => {
        if (p !== 'granted') showMessage(t('tiltPermDenied'));
        else showMessage(t('tiltPrompt'));
      }).catch(() => showMessage(t('tiltNotResponding')));
    } else showMessage(t('tiltPrompt'));
  } else if (c === 'swipe') showMessage(t('swipeHint'));
  else if (c === 'wasd') showMessage(t('wasdHint'));
  else showMessage(t('arrowsHint'));
}

// =================== LABELS ===================
function applyLabels() {
  // Render title with first and last words as clickable spans (two secret gestures)
  const title = t('title');
  const parts = title.split(' ');
  let titleHtml;
  if (parts.length === 1) {
    titleHtml = `<span class="title-word${invincible ? ' struck' : ''}">${parts[0]}</span>`;
  } else {
    const first = parts[0];
    const last = parts[parts.length - 1];
    const middle = parts.slice(1, -1).join(' ');
    const middleHtml = middle ? ` ${middle} ` : ' ';
    titleHtml = `<span class="title-word${invincible ? ' struck' : ''}">${first}</span>${middleHtml}<span class="title-last-word">${last}</span>`;
  }
  document.getElementById('gameTitle').innerHTML = titleHtml;
  document.title = title;
  document.getElementById('lblMoves').textContent = t('moves');
  document.getElementById('lblRound').textContent = t('round');
  document.getElementById('lblKilled').textContent = t('killed');
  document.getElementById('useBtn').textContent = t('use');
  document.getElementById('infoBtn').textContent = t('info');
  document.getElementById('restartBtn').textContent = t('newGame');
}

// =================== INIT ===================
function init() {
  canvas = document.getElementById('canvas');
  canvas.width = CANVAS_SIZE;
  canvas.height = CANVAS_SIZE;
  ctx = canvas.getContext('2d');

  applyLabels();

  // Default control by device
  const defaultControl = IS_MOBILE ? 'swipe' : 'arrows';
  control = defaultControl;
  document.getElementById('ctrlBtn').textContent = controlLabel(control);

  document.getElementById('ctrlBtn').addEventListener('click', cycleControl);
  document.getElementById('useBtn').addEventListener('click', useItem);
  document.getElementById('infoBtn').addEventListener('click', openInfo);
  document.getElementById('modalClose').addEventListener('click', () => {
    // Don't allow close while shop or swap is active
    if (pendingPickup || (state && state.transitioning)) return;
    document.getElementById('modal').classList.remove('open');
  });
  document.getElementById('modal').addEventListener('click', (e) => {
    if (e.target.id !== 'modal') return;
    if (pendingPickup || (state && state.transitioning)) return;
    document.getElementById('modal').classList.remove('open');
  });
  document.getElementById('gameTitle').addEventListener('click', (e) => {
    if (!e.target || !e.target.classList) return;
    if (e.target.classList.contains('title-word')) onTitleTap();
    else if (e.target.classList.contains('title-last-word')) onLastWordTap();
  });
  document.getElementById('restartBtn').addEventListener('click', () => {
    document.getElementById('restartBtn').style.display = 'none';
    showMessage('');
    newGame();
  });

  bindKeyboard();
  bindTouch();
  bindTilt();

  newGame();
}

init();
</script>
