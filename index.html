<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Labyrinth</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 10px; background: #f5f5f7; color: #111;
    display: flex; justify-content: center; min-height: 100vh;
    overscroll-behavior: none; user-select: none; -webkit-user-select: none;
  }
  #app {
    max-width: 500px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  h1 { font-size: 22px; margin: 4px 0 0; font-weight: 800; text-align: center; }
  #hud { display: flex; gap: 14px; font-size: 13px; color: #555; flex-wrap: wrap; justify-content: center; }
  #hud span { font-weight: 700; color: #111; }
  #objective { padding: 6px 12px; background: #fff8e1; border: 1px solid #ffd54f; border-radius: 6px; font-size: 13px; text-align: center; max-width: 460px; line-height: 1.35; }
  #topRow {
    display: flex; gap: 6px;
    max-width: 396px; width: 100%;
    min-height: 95px;
  }
  #eventLog {
    flex: 0 0 35%; width: 35%;
    max-height: 95px; overflow-y: auto;
    padding: 4px 8px;
    background: #f9f9f9; border: 1px solid #e0e0e0; border-radius: 6px;
    font-size: 11px; line-height: 1.35; color: #333;
    display: flex; flex-direction: column; gap: 1px;
  }
  #eventLog .log-entry { padding: 1px 0; border-bottom: 1px dashed #eee; }
  #eventLog .log-entry:last-child { border-bottom: none; font-weight: 600; color: #111; }
  #newsBlock {
    flex: 1 1 65%; width: 65%;
    max-height: 95px; overflow-y: auto;
    padding: 4px 8px;
    background: #e8f5e9; border: 1px solid #a5d6a7; border-radius: 6px;
    font-size: 11px; line-height: 1.35; color: #1b5e20;
  }
  #newsBlock .news-entry { padding: 2px 0; border-bottom: 1px dashed #c8e6c9; }
  #newsBlock .news-entry:last-child { border-bottom: none; }
  #newsBlock:empty { display: none; }
  #statusBar {
    display: flex; justify-content: space-between; align-items: center;
    max-width: 396px; width: 100%; padding: 0 4px;
    font-size: 14px; font-weight: 600;
  }
  #statusBar:empty, #statusBar:has(#keyStatus:empty) { display: none; }
  #keyStatus { color: #111; }
  #canvasWrap { perspective: 1400px; display: flex; justify-content: center; width: 100%; }
  #cubeStage { position: relative; transform-style: preserve-3d; display: inline-block; }
  canvas { background: #fff; touch-action: none; max-width: 100%; height: auto; display: block; backface-visibility: hidden; }
  #canvasBack { position: absolute; top: 0; left: 0; display: none; }
  #inventory { display: flex; flex-direction: column; align-items: center; gap: 4px; margin-top: 2px; }
  #invLabel { font-size: 11px; color: #888; }
  #invSlots { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; max-width: 460px; }
  .slot { width: 40px; height: 40px; background: #fff; border: 1px solid #ccc; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; position: relative; }
  .slot.empty { background: #f0f0f0; border-style: dashed; color: #bbb; }
  .slot.selected { border: 2px solid #2874e7; box-shadow: 0 0 0 2px rgba(40,116,231,0.2); }
  .slot .idx { position: absolute; top: 0; left: 2px; font-size: 9px; color: #999; }
  #controls { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
  button { padding: 7px 10px; font-size: 12px; border: 1px solid #c0c0c0; background: #fff; border-radius: 6px; cursor: pointer; touch-action: manipulation; font-weight: 600; color: #222; }
  button:active { transform: scale(0.96); }
  #ctrlBtn { background: #fff; border: 1px solid #111; color: #111; min-width: 120px; }
  #useBtn { background: #2874e7; color: #fff; border-color: #2874e7; }
  #infoBtn { background: #fff; border-color: #888; }
  .title-word { display: inline-block; cursor: pointer; user-select: none; -webkit-user-select: none; transition: text-decoration-color 0.2s; }
  .title-last-word { display: inline-block; cursor: pointer; user-select: none; -webkit-user-select: none; }
  .title-word.struck { text-decoration: line-through; text-decoration-color: #f39c12; text-decoration-thickness: 3px; }
  #restartBtn { background: #27ae60; color: #fff; border: none; padding: 10px 18px; font-size: 14px; margin-top: 4px; }
  #message { min-height: 20px; font-size: 13px; text-align: center; color: #c0392b; font-weight: 600; padding: 0 8px; }
  #modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.55); display: none; align-items: center; justify-content: center; padding: 16px; z-index: 100; }
  #modal.open { display: flex; }
  #modalBox { background: #fff; max-width: 460px; width: 100%; max-height: 85vh; overflow-y: auto; border-radius: 10px; padding: 16px 18px; position: relative; }
  #modalBox h2 { margin: 0 0 10px; font-size: 18px; }
  #modalBox h3 { margin: 14px 0 6px; font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
  #modalClose { position: absolute; top: 8px; right: 8px; border: none; background: transparent; font-size: 22px; cursor: pointer; }
  .info-row { display: flex; gap: 10px; align-items: flex-start; padding: 6px 0; font-size: 13px; }
  .info-icon { flex: 0 0 28px; font-size: 20px; text-align: center; line-height: 1.2; }
  .info-body .info-title { font-weight: 700; margin-bottom: 2px; }
  .info-body .info-desc { color: #555; line-height: 1.4; }
  .info-empty { color: #999; font-size: 12px; font-style: italic; padding: 6px 0; }
  .shop-choices { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .swap-choices { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
  .shop-choice { flex: 1 1 120px; background: #fafafa; border: 2px solid #ddd; border-radius: 8px; padding: 12px; text-align: center; cursor: pointer; }
  .shop-choice:hover { border-color: #2874e7; }
  .shop-emoji { font-size: 32px; }
  .shop-name { font-weight: 700; margin-top: 4px; font-size: 13px; }
  .shop-desc { font-size: 11px; color: #666; margin-top: 4px; line-height: 1.3; }
  .shop-skip, .swap-skip { margin-top: 10px; padding: 8px 12px; background: #eee; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; width: 100%; }
  .swap-choice {
    width: 56px; height: 70px;
    background: #fafafa; border: 2px solid #ddd; border-radius: 6px;
    padding: 4px; text-align: center; cursor: pointer;
    display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 2px;
  }
  .swap-choice:hover { border-color: #2874e7; }
  .swap-emoji { font-size: 22px; line-height: 1; }
  .swap-name { font-size: 10px; color: #333; line-height: 1.1; }
  .swap-new { background: #fff3cd; border-color: #ffc107; }
  .swap-section-label { font-size: 11px; color: #666; margin-top: 8px; margin-bottom: 2px; font-weight: 600; }
  @keyframes flash { 0% { background: #fff9c4; } 100% { background: #fff; } }
</style>
</head>
<body>
<div id="app">
  <h1 id="gameTitle">Labyrinth</h1>
  <div id="hud">
    <div><span id="lblMoves">Moves</span>: <span id="moves">0</span></div>
    <div><span id="lblRound">Round</span>: <span id="round">1</span></div>
    <div><span id="lblKilled">Killed</span>: <span id="killed">0</span></div>
  </div>
  <div id="controls">
    <button id="ctrlBtn"></button>
    <button id="useBtn"></button>
    <button id="infoBtn"></button>
  </div>
  <div id="statusBar"><span id="keyStatus"></span></div>
  <div id="topRow">
    <div id="eventLog"></div>
    <div id="newsBlock"></div>
  </div>
  <div id="canvasWrap">
    <div id="cubeStage">
      <canvas id="canvas"></canvas>
      <canvas id="canvasBack"></canvas>
    </div>
  </div>
  <div id="inventory">
    <div id="invSlots"></div>
  </div>
  <div id="message"></div>
  <button id="restartBtn" style="display:none"></button>
</div>

<div id="modal">
  <div id="modalBox">
    <button id="modalClose">×</button>
    <h2 id="modalTitle"></h2>
    <div id="modalContent"></div>
  </div>
</div>

function detectLanguage() {
  const navLang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
  if (navLang.startsWith('ru')) return 'ru';
  if (navLang.startsWith('uk')) return 'uk';
  return 'en';
}

function detectMobile() {
  const ua = navigator.userAgent || '';
  const mobileRegex = /Mobi|Android|iPhone|iPad|iPod|BlackBerry|Windows Phone/i;
  return mobileRegex.test(ua) || (('ontouchstart' in window) && Math.min(window.innerWidth, window.innerHeight) < 900);
}

let LANG = detectLanguage();
let IS_MOBILE = detectMobile();
function t(key, ...args) {
  const val = I18N[LANG][key] || I18N.en[key] || key;
  return typeof val === 'function' ? val(...args) : val;
}
